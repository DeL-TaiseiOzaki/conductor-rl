# Ruff config kept OUT of pyproject.toml on purpose:
# `prime env push --auto-bump` rewrites every "version"-like key in
# pyproject.toml (including [tool.ruff] target-version) to the bumped
# package version, corrupting it. Keeping ruff config here makes pushes
# idempotent.
target-version = "py310"
line-length = 88

[lint]
select = ["E", "W", "F", "I", "B", "UP"]
ignore = ["E501"]

[format]
quote-style = "double"
